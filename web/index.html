<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FerrisHost Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1em;
        }

        .status-section {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .status-section h2 {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 10px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #666;
            font-weight: 500;
        }

        .status-value {
            color: #333;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .badge.ready {
            background: #d4edda;
            color: #155724;
        }

        .badge.pending {
            background: #fff3cd;
            color: #856404;
        }

        .badge.error {
            background: #f8d7da;
            color: #721c24;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦀 FerrisHost</h1>
        <p class="subtitle">Personal Cloud Bootstrapper</p>

        <div class="status-section">
            <h2>System Status</h2>
            <div class="status-item">
                <span class="status-label">Kubernetes</span>
                <span class="status-value"><span class="badge pending">Initializing</span></span>
            </div>
            <div class="status-item">
                <span class="status-label">ferrishost-web</span>
                <span class="status-value"><span class="badge ready">Running</span></span>
            </div>
            <div class="status-item">
                <span class="status-label">GPU Support</span>
                <span class="status-value"><span class="badge pending">Detecting</span></span>
            </div>
        </div>

        <div class="status-section">
            <h2>Setup Progress</h2>
            <div id="setup-progress">
                <div class="loading"></div> Loading setup status...
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="loadSetup()">Continue Setup</button>
            <button class="btn-secondary" onclick="loadStatus()">Refresh Status</button>
        </div>
    </div>

    <script>
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                console.log('Cluster status:', data);
            } catch (error) {
                console.error('Failed to load status:', error);
            }
        }

        async function loadSetup() {
            try {
                const response = await fetch('/api/setup');
                const data = await response.json();
                console.log('Setup state:', data);
            } catch (error) {
                console.error('Failed to load setup:', error);
            }
        }

        // Load status on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadStatus();
            loadSetup();
        });
    </script>
</body>
</html>
