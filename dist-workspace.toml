[workspace]
members = ["cargo:ferrishost-cli"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = ["github"]
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Linux only — ferrishost requires Linux)
# musl targets produce fully static binaries with no glibc dependency
targets = [
    "aarch64-unknown-linux-musl",
    "x86_64-unknown-linux-musl",
]
