# AMD GPU Device Plugin DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amd-gpu-device-plugin
  namespace: default
spec:
  selector:
    matchLabels:
      app: amd-gpu-device-plugin
  template:
    metadata:
      labels:
        app: amd-gpu-device-plugin
    spec:
      tolerations:
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: amd-gpu-device-plugin
          image: rocm/k8s-device-plugin:latest
          securityContext:
            privileged: false
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: sys
              mountPath: /sys
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: sys
          hostPath:
            path: /sys

---
# AMD RuntimeClass
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: amd
handler: runc
